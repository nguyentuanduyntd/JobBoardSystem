version: '3.8'

services:
  #Database MySQL
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: jobboard_db
      MYSQL_USER: jobboard_user
      MYSQL_PASSWORD: Tuanduy1805@
      MYSQL_ROOT_PASSWORD: Tuanduy1805@
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pTuanduy1805@"]
      interval : 10s
      timeout: 5s
      retries: 5
  #Cache Redis
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  #Backend Django
  backend:
    build: ./backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  #Frontend React
  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    stdin_open: true #Giúp React không bị tắt ngay khi khởi động qua Docker
    depends_on:
      - backend

volumes:
  mysql_data: