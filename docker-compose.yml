version: '3.8'

services:
  #Database MySQL
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: jobboard_db
      MYSQL_USER: jobboard_user
      MYSQL_PASSWORD: root
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3305:3306"
    healthcheck:
        test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
        interval: 10s
        timeout: 5s
        retries: 5
  #Cache Redis
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  #Backend Django
  backend:
    build: ./backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  #Frontend React
  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    stdin_open: true #Giúp React không bị tắt ngay khi khởi động qua Docker
    depends_on:
      - backend

  rabbitmq:
    image: rabbitmq:3-management
    container_name: jobboard_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq_data
    healthcheck:
      test: ["CMD","rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    
  #Xử lý async tasks
# Xử lý async tasks
  celery_worker:
    build: ./backend
    working_dir: /app/jobboard 
    command: celery -A jobboard worker --loglevel=info --queues=default,emails,notifications
    volumes:
      - ./backend:/app
    env_file:
      - .env
    restart: always
    depends_on:
      db: 
        condition: service_healthy
      rabbitmq: 
        condition: service_healthy

  # Celery beat - scheduled tasks
  celery_beat:
    build: ./backend
    working_dir: /app/jobboard
    command: celery -A jobboard beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app
    env_file:
      - .env
    restart: always
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
  
  flower:
    image: mher/flower:2.0.0
    command: celery flower --broker=amqp://guest:guest@rabbitmq:5672/ --port=5555
    ports:
      - "5555:5555"
    env_file:
    - .env
    restart: always
    depends_on:
      - rabbitmq
      - celery_worker
    

volumes:
  mysql_data:
  rabbitmq_data: